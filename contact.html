<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AGC International — Contact</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo"><span>AGC</span> International</a>
    <button class="nav-burger" id="burger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="brands.html">Brands</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <main>
    <div class="page-header">
      <h1>Contact Us</h1>
    </div>

    <div class="contact-grid">
      <div class="contact-info">
        <h2>Get in Touch</h2>
        <p>
          Have a question or want to work together?
          Fill out the form or reach us directly using the details below.
        </p>

        <div class="contact-detail">
          <span>&#9993;</span>
          <a href="mailto:hello@agc.com">contact@agc-intl.com</a>
        </div>
        <div class="contact-detail">
          <span>&#9742;</span>
          <span>+976 86721481</span>
        </div>
      </div>

      <form>
        <div>
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Full Name *" required />
        </div>
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Email *" required />
        </div>
        <div>
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Message" required></textarea>
        </div>
        <button type="submit">Send Message</button>
      </form>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 AGC International. All rights reserved.</p>
  </footer>

  <script src="main.js"></script>
</body>
</html>
